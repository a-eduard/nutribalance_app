name: flutter_application_1
description: "Fitness MVP App with Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  # Иконки и Шрифты
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # Локализация
  flutter_localizations:
    sdk: flutter
    
  # Firebase (База данных и Авторизация)
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Генератор иконок
  flutter_launcher_icons: "^0.13.1"

# Настройка иконки приложения
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true