name: flutter_application_1
description: "Fitness MVP App with Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  # Иконки и Шрифты
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # Локализация
  flutter_localizations:
    sdk: flutter
    
  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  google_sign_in: ^6.2.1

  # Утилиты
  fl_chart: ^0.66.0
  share_plus: ^7.2.0
  intl: ^0.20.0
  image_picker: ^1.0.7

  # ДОБАВЛЕНО ДЛЯ YANDEX GPT:
  http: ^1.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true