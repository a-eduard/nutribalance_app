name: flutter_application_1
description: "Fitness MVP App with Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI и Шрифты
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  timezone: ^0.9.2
  flutter_timezone: ^2.0.0

  # Локализация
  easy_localization: ^3.0.7
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # Firebase (Синхронизированные версии)
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6 
  firebase_messaging: ^16.1.1 
  google_sign_in: ^6.2.2
  cloud_functions: ^6.0.6 # <-- ДОБАВЛЕНО ДЛЯ ВЫЗОВА БЭКЕНДА
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  # Пакет google_generative_ai удален, так как ИИ теперь живет в Cloud Functions

  # Уведомления
  flutter_local_notifications: ^18.0.1

  # Утилиты
  fl_chart: ^0.70.2
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  
  # HTTP и кэш
  http: ^1.3.0
  shared_preferences: ^2.5.2
  google_generative_ai: ^0.4.7
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/icons/